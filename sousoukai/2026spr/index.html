<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/common.css">
        <link rel="stylesheet" href="../sousoukai-common.css">
        <title>想智創世会議 2026春季 - Lang Lounge</title>
    </head>
    <body>
        <div class="mainContainer">
            <h1>想智創世会議 2026春季</h1>

            <p>日時：2026年4月26日 (日) 13:20～16:00</p>
            <p>会場：Lang Lounge 特設ボイスチャンネル</p>
            <h2>タイムテーブル</h2>
            <p>右上のリンクより、アーカイブの該当部分と発表資料にアクセスできます。</p>
            <div class="timeTable">
                <div class="slot">
                    <div class="slotNumber">5</div>
                    <div class="slotDesc">
                        <div class="slotInfo">
                            <span class="slotTime">
                                <i class="fa-solid fa-clock"></i>13:35～14:05
                            </span>
                            <span class="presenter">
                                <i class="fa-solid fa-user"></i>レイス
                            </span>
                        </div>
                        <div class="slotName">ヘムナ語について</div>
                    </div>
                </div>
                <div class="slot">
                    <div class="slotNumber">6</div>
                    <div class="slotDesc">
                        <div class="slotInfo">
                            <span class="slotTime">
                                <i class="fa-solid fa-clock"></i>14:10～14:40
                            </span>
                            <span class="presenter">
                                <i class="fa-solid fa-user"></i>slaimsan
                            </span>
                        </div>
                        <div class="slotName">なぜ言語創作は行き詰まるのか -言語創作における3つの段階-</div>
                    </div>
                </div>
                <div class="slot">
                    <div class="slotNumber">7</div>
                    <div class="slotDesc">
                        <div class="slotInfo">
                            <span class="slotTime">
                                <i class="fa-solid fa-clock"></i>14:45～15:15
                            </span>
                            <span class="presenter">
                                <i class="fa-solid fa-user"></i>Qunoxts
                            </span>
                        </div>
                        <div class="slotName">ルエン語の軌跡</div>
                    </div>
                </div>
                <div class="slot">
                    <div class="slotNumber">8</div>
                    <div class="slotDesc">
                        <div class="slotInfo">
                            <span class="slotTime">
                                <i class="fa-solid fa-clock"></i>15:20～15:50
                            </span>
                            <span class="presenter">
                                <i class="fa-solid fa-user"></i>タクタク・テラ
                            </span>
                        </div>
                        <div class="slotName">タクタク・テラの成果物紹介 🈞</div>
                    </div>
                </div>
            </div>
            <h2>中継配信</h2>
            <p>以下から想創会のアーカイブを視聴できます。</p>
            <div class="embedYoutube">
                <iframe width="800" src="https://www.youtube.com/embed/tbnk8fyLpsg?si=VVw9D7TvPOcqwLyw" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

    <script src="/js/main.js"></script>
